name: 🎮 Free Games Auto Notifier

on:
  schedule:
    - cron: "0 */6 * * *"   # runs every 6 hours
  workflow_dispatch:          # allows manual trigger from Actions tab
  push:

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: pip install requests beautifulsoup4

      - name: 🛒 Run Epic Games notifier
        env:
          EMAIL: ${{ secrets.EMAIL }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          EMAILJS_PRIVATE_KEY: ${{ secrets.EMAILJS_PRIVATE_KEY }}
        run: python epic.py

      - name: 🎮 Run Steam notifier
        env:
          EMAIL: ${{ secrets.EMAIL }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          EMAILJS_PRIVATE_KEY: ${{ secrets.EMAILJS_PRIVATE_KEY }}
        run: python steam.py

      - name: 💾 Commit & push updated state files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add free-epic.txt free-steam.txt

          # Only commit if there are actual changes
          git diff --cached --quiet || (
            git commit -m "🔄 Update free games state [skip ci]"
            git push
          )
